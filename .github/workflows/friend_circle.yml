name: Friend Circle

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

env:
  TZ: Asia/Shanghai

jobs:
  friend-circle:
    runs-on: ubuntu-latest

    steps:
    - name: Pull Latest Repository
      uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Check RSS feeds
      run: |
        go run .
        
    - name: git config
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        # enable repo-managed hooks
        git config core.hooksPath .githooks
        chmod +x .githooks/commit-msg || true

    - name: Commit changes
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git add .
        git commit -m "chore: update rss feeds" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git master
